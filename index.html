<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite Mini Crossword</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1>Infinite Mini</h1>
        <div class="controls">
          <button id="newPuzzleBtn">New Puzzle</button>
          <button id="checkWordBtn">Check Word</button>
          <button id="checkPuzzleBtn">Check Puzzle</button>
          <button id="revealWordBtn">Reveal Word</button>
          <button id="revealPuzzleBtn">Reveal Puzzle</button>
          <label class="toggle">
            <input id="autoCheckToggle" type="checkbox" />
            Auto-check
          </label>
        </div>
      </header>

      <section class="board-wrap">
        <div id="grid" class="grid" aria-label="crossword grid" role="grid"></div>
        <aside class="sidebar">
          <div class="status">
            <p><strong>Timer:</strong> <span id="timer">00:00</span></p>
            <p><strong>Puzzle #</strong><span id="seed"></span></p>
          </div>
          <div class="clues">
            <section>
              <h2>Across</h2>
              <ol id="acrossClues"></ol>
            </section>
            <section>
              <h2>Down</h2>
              <ol id="downClues"></ol>
            </section>
          </div>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
